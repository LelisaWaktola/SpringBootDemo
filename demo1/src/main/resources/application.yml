spring:
  application:
    name: budget-manager

  datasource:
    url: jdbc:postgresql://localhost:5432/TestDb
    username: postgres
    password:
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
    show-sql: false

  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  servlet:
    context-path: /api
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET:your-super-secret-key-change-this-in-production-at-least-32-characters}
    expiration: 86400000
  cors:
    allowed-origins: http://localhost:3000,http://localhost:5173
    allowed-methods: GET,POST,PUT,DELETE,OPTIONS
    max-age: 3600

logging:
  level:
    root: INFO
    com.expense: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
